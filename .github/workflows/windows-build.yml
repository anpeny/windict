name: Windows Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build WPF app
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\Easydict.Windows\Easydict.Windows.csproj

      - name: Build Debug
        run: dotnet build .\Easydict.Windows\Easydict.Windows.csproj --configuration Debug --no-restore

      - name: Build Release
        run: dotnet build .\Easydict.Windows\Easydict.Windows.csproj --configuration Release --no-restore

      - name: Publish win-x64
        run: .\scripts\publish-win-x64.ps1

      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: easydict-windows-win-x64
          path: Easydict.Windows\bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\
          if-no-files-found: error

      - name: Package release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $publishDir = "Easydict.Windows\bin\Release\net8.0-windows10.0.19041.0\win-x64\publish"
          $zipPath = "Easydict.Windows-${{ github.ref_name }}-win-x64.zip"
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipPath -Force

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zipPath = "Easydict.Windows-${{ github.ref_name }}-win-x64.zip"
          gh release create "${{ github.ref_name }}" $zipPath `
            --repo "${{ github.repository }}" `
            --title "Easydict Windows ${{ github.ref_name }}" `
            --notes "Initial Windows preview build. Includes lookup, OCR, silent OCR, tray mode, history, configurable hotkeys, and the custom question-bank API preset."

  validate:
    name: Validate project files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate XML files
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          xmllint --noout \
            Easydict.Windows/*.xaml \
            Easydict.Windows/Views/*.xaml \
            Easydict.Windows/*.csproj \
            Easydict.Windows/app.manifest \
            Easydict.Windows/Properties/PublishProfiles/*.pubxml

      - name: Check unfinished markers
        run: |
          ! grep -RInE "TODO|FIXME|NotImplemented|throw new NotImplementedException" \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude-dir=bin \
            --exclude-dir=obj \
            .
